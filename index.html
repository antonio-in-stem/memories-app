<!doctype html>
<html lang="es" data-bs-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Static professional memories feed for Generation CH65.">
    <title>Memories | Generation CH65</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Righteous&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    >
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  </head>
  <body>
    <header class="topbar sticky-top">
      <nav class="navbar navbar-expand">
        <div class="container-xxl topbar-inner">
          <a class="navbar-brand brand-mark" href="#" aria-label="Memories home">
            <span class="brand-orbit" aria-hidden="true"></span>
            Memories
          </a>

          <div class="search-shell">
            <label class="visually-hidden" for="globalSearch">Search memories</label>
            <input
              id="globalSearch"
              class="form-control search-input"
              type="search"
              placeholder="Search people, roles, memories"
              autocomplete="off"
            >
          </div>

          <button
            id="themeToggle"
            class="btn btn-icon"
            type="button"
            aria-label="Toggle color theme"
            title="Toggle color theme"
          >
            <span aria-hidden="true">◐</span>
          </button>
        </div>
      </nav>
    </header>

    <main class="container-xxl app-shell">
      <section id="heroStage" class="hero-stage" aria-labelledby="generationTitle">
        <div class="hero-copy">
          <p id="generationLabel" class="generation-label">Generation CH65</p>
          <h1 id="generationTitle">Professional memories</h1>
          <p class="hero-deck">
            Recognition, craft, and collaboration captured as a polished professional archive.
          </p>
          <div id="heroDots" class="hero-dots" aria-label="Hero scene controls"></div>
        </div>

        <div id="summaryPanel" class="summary-panel" aria-label="Directory summary"></div>
      </section>

      <section class="profile-rail-panel" aria-label="Profiles">
        <button id="railPrev" class="rail-button rail-button-prev" type="button" aria-label="Previous team members">
          <span aria-hidden="true">‹</span>
        </button>
        <div id="profileRail" class="profile-rail" tabindex="0" role="region" aria-label="Team members"></div>
        <button id="railNext" class="rail-button rail-button-next" type="button" aria-label="Next team members">
          <span aria-hidden="true">›</span>
        </button>
      </section>

      <div id="dataAlerts" class="data-alerts" aria-live="polite"></div>

      <section class="content-grid" aria-label="Memories feed">
        <div class="feed-column">
          <div class="section-kicker">
            <span>Featured recognition</span>
            <span id="feedCount">0 memories</span>
          </div>
          <div id="feedList" class="feed-list" aria-live="polite"></div>
        </div>

        <aside class="insight-column" aria-label="Profile spotlight">
          <div id="spotlightPanel" class="spotlight-panel"></div>
          <div id="leaderboardPanel" class="leaderboard-panel"></div>
        </aside>
      </section>
    </main>

    <dialog id="memoryDialog" class="memory-dialog" aria-labelledby="memoryDialogTitle">
      <article class="dialog-card">
        <button id="dialogClose" class="dialog-close" type="button" aria-label="Close memory">×</button>
        <button id="dialogPrev" class="dialog-nav dialog-nav-prev" type="button" aria-label="Previous memory">
          <span aria-hidden="true">‹</span>
        </button>
        <button id="dialogNext" class="dialog-nav dialog-nav-next" type="button" aria-label="Next memory">
          <span aria-hidden="true">›</span>
        </button>
        <span class="dialog-stack-layer dialog-stack-layer-one" aria-hidden="true"></span>
        <span class="dialog-stack-layer dialog-stack-layer-two" aria-hidden="true"></span>
        <div id="dialogContent"></div>
      </article>
    </dialog>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
